  - name: "Societal Unrest Prediction Model"
    #URL is optional
    git_url: "https://github.com/vishnupan819/unrest_data"
    # The project description must start with an action verb (https://bit.ly/3guO98u)
    description: "Developed logistic regression model and random forest classifier to predict monthly unrest events across 50 global regions based on 10 years of economic, environmental, and sociopolitical indicators
Engineered temporal and interaction-based features and applied time-series cross-validation to improve recall from <5% to ~95%while maintaining high precision and overall model performance (F1, AUC-ROC > 90%)
Proposed actionable policy analyst alert rules based on feature importances and output probability thresholds"
  - name: "Medical Imaging Diagnosis Tool"
    git_url: "https://github.com/skadri342/chest-imaging-diagnosis-tool-capstone"
    description: "Led model development for lung disease classification using CNNs (ResNet-50, EfficientNet-B4, DenseNet-121) and the NIH Chest X-rays Dataset (~112k images)
Designed and tested a custom CNN (based on LeNet) with batch normalization and BCEWithLogitsLoss; results informed shift to more effective pre-trained models
Implemented pre-trained U-Net for disease segmentation and for visual purposes, improving interpretability and localization of model predictions
Built and optimized data pipelines using tf.data for efficient data loading and training performance
Contributed to model selection, hyperparameter tuning and performance evaluation of models
Trained and optimized models to reach up to 90%+ prediction accuracy for lung diseases"

