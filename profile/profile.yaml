# List of Jarvis projects
jarvis_projects:
  - name: "Cluster Monitor"
    git_url: "https://github.com/jarviscanada/jarvis_data_eng_VishnuPanganamamula/tree/develop/linux_sql"
    # The project description allows hiring managers to understand your project and technologies you used(e.g. programming languages, libraries, algorithms, hardware, tools, etc.).
    # The project description must start with an action verb (https://bit.ly/3guO98u)
    description: Used Linux commands, Bash scripting, PostgreSQL database and Docker to create a Linux Cluster Monitoring Tool. The monitoring system records specific hardware information of a host VM and what resources of the system are being used. This usage data is recorded and monitored from a host VM running Rocky Linux in real time. The data for the host usage is collected and stored in the PostgreSQL database regularly, allowing users to check their VM usage activity.
   

